for(let j=0;j<N;j++){if(j<HC){cf.push(w.btcf[j]);continue;}const bR=w.oilRev[j]+w.gasRev[j]+w.nglRev[j];const nR=w.oilRev[j]*oM+w.gasRev[j]*gM+w.nglRev[j]*nM;
const rr=bR>0?nR/bR:1;cf.push(w.btcf[j]+(nR-bR)-w.sevTax[j]*(rr-1));}return cf;}

function recomp(oP,gP,nP){
const cf=W.map((_,i)=>adjBTCF(i,oP,gP,nP));
const mo=cf.map(c=>{const m=new Array(N).fill(0);let f=-1;for(let j=0;j<N;j++){if(c[j]>0&&f<0)f=j;}if(f>=0)for(let j=f;j<N;j++)m[j]=j-f+1;return m;});
const cum=cf.map(c=>{const a=[];let s=0;for(let j=0;j<N;j++){s+=c[j];a.push(s);}return a;});
const pm=cf.map((_,i)=>{for(let j=0;j<N;j++){if(mo[i][j]>0&&cum[i][j]>0)return mo[i][j];}return null;});
const cpn=cum.map((r,i)=>r.map(v=>W[i].nma?v/W[i].nma*1000:0));
function cnAt(i,t){for(let j=0;j<N;j++){if(mo[i][j]===t)return cpn[i][j];}return null;}
const tCF=new Array(N).fill(0);for(let j=0;j<N;j++)for(let i=0;i<W.length;i++)tCF[j]+=cf[i][j];
const tCum=[];{let s=0;for(let j=0;j<N;j++){s+=tCF[j];tCum.push(s);}}
// Adjusted NOI: base NOI + revenue delta - sev tax delta
const oM=oP/BO,gM=gP/BG,nM=nP/BN;
const noi=W.map((w,i)=>{const a=[];for(let j=0;j<N;j++){
if(j<HC){a.push(w.noi[j]||0);continue;}
const bR=w.oilRev[j]+w.gasRev[j]+w.nglRev[j];
const nR=w.oilRev[j]*oM+w.gasRev[j]*gM+w.nglRev[j]*nM;
const rr=bR>0?nR/bR:1;
a.push((w.noi[j]||0)+(nR-bR)-w.sevTax[j]*(rr-1));}return a;});
// Production rates (not affected by price)
const oilBD=W.map((w,i)=>w.oilVol.map((v,j)=>v*1000/DIM[j]));
const gasMD=W.map((w,i)=>w.gasVol.map((v,j)=>v*1000/DIM[j]));
const nglBD=W.map((w,i)=>w.nglVol.map((v,j)=>v*1000/DIM[j]));
const boeBD=W.map((w,i)=>w.oilVol.map((v,j)=>(w.oilVol[j]+w.nglVol[j])*1000/DIM[j]+w.gasVol[j]*1000/DIM[j]/6));
// Dynamic IRR
const irr=cf.map(row=>{let s=0;while(s<row.length&&row[s]===0)s++;const c=row.slice(s);
if(c.length<2||!c.some(v=>v<0)||!c.some(v=>v>0))return null;
let r=0.01;for(let it=0;it<1000;it++){let npv=0,dn=0;
for(let t=0;t<c.length;t++){const d=Math.pow(1+r,t);npv+=c[t]/d;dn-=t*c[t]/(d*(1+r));}
if(Math.abs(dn)<1e-20)break;const rN=r-npv/dn;if(Math.abs(rN-r)<1e-10){r=rN;return r>-1?Math.pow(1+r,12)-1:null;}
r=rN;if(r<=-1)r=-0.99;}return null;});
// Dynamic PV10: discount monthly BTCF at 10% annual (compounded monthly)
const _r10=Math.pow(1.10,1/12)-1;
const pv10=cf.map(row=>{let pv=0;for(let j=0;j<row.length;j++)pv+=row[j]/Math.pow(1+_r10,j);return pv;});
return{cf,mo,cum,pm,cpn,cnAt,tCF,tCum,oilBD,gasMD,nglBD,boeBD,irr,noi,pv10};}

function syncWellDropdown(){
  const c=cat();
  const opts=document.querySelectorAll('#wf option');

    if(v==='-1'){o.hidden=false;return;}

}

function dlOpts(color,fmt){return{display:true,color:color||'#e0e0e0',font:{size:9,weight:'bold'},anchor:'end',align:'top',formatter:fmt||(v=>v!=null?fmtK(v):'')}}
function fmtK(v){if(v==null)return'';if(Math.abs(v)>=1000)return'$'+(v/1000).toFixed(1)+'MM';if(Math.abs(v)>=1)return'$'+v.toFixed(0)+'K';return'$'+v.toFixed(1)+'K';}
function fmtD(v){if(v==null)return'';return Math.round(v).toLocaleString();}
function fmtKPI(v){if(Math.abs(v)>=1000)return'$'+addC((v/1000).toFixed(1))+'MM';return'$'+addC(v.toFixed(1))+'K';}
function fmtNMA(v){if(v==null)return'';const neg=v<0;const a=Math.abs(v);return(neg?'-':'')+'$'+addC(Math.round(a).toString())+'/NMA';}
function fmtMdol(v){if(v==null)return'';const neg=v<0;const a=Math.abs(v);if(a>=1000)return(neg?'-':'')+'$'+addC((a/1000).toFixed(2))+'MM';return(neg?'-':'')+'$'+addC(a.toFixed(1))+'K';}
function addC(s){const p=s.split('.');p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');return p.join('.');}

const f=sel();
const isAll=f<0;

// KPIs
const vp=wList.map(i=>d.pm[i]).filter(v=>v!=null);
const avgP=vp.length?(vp.reduce((a,b)=>a+b,0)/vp.length).toFixed(1):'--';
const tNMA=wList.reduce((s,i)=>s+W[i].nma,0);
const lastC=isAll?d.tCum[N-1]:d.cum[f][N-1];
let wIRRnum=0,wIRRden=0;
for(const i of wList){if(d.irr[i]!=null){wIRRnum+=d.irr[i]*W[i].nma;wIRRden+=W[i].nma;}}
const wIRR=wIRRden>0?(wIRRnum/wIRRden*100).toFixed(1)+'%':'N/A';
document.getElementById('kpis').innerHTML=
  kpi('Wells',wList.length)+kpi('Avg Payout',avgP+' mo')+kpi('Wtd. Avg. IRR',wIRR)+kpi('Total Cum CF',fmtKPI(lastC));

// Payout
const pExcl=['Puffin','Quetzal','Topaz'];
const pS=wList.map(i=>({n:W[i].name,p:d.pm[i],idx:i,hasCap:W[i].capex.some(v=>v>0)})).filter(x=>x.p!=null&&x.hasCap&&!pExcl.includes(x.n)).sort((a,b)=>b.p-a.p);
charts.c1.data.labels=pS.map(x=>x.n);charts.c1.data.datasets[0].data=pS.map(x=>x.p);
charts.c1._payIdx=pS.map(x=>x.idx);charts.c1.update();

charts.c2.update();

// Cumulative CF
if(isAll){

// MOIC at 36 months: cumulative adjusted NOI through month 36 / total AFE

  if(!found||afe===0)return{n:W[i].name,moic:null};
  return{n:W[i].name,moic:cumNOI/afe};
}).filter(x=>x.moic!=null).sort((a,b)=>b.moic-a.moic);
charts.c10.data.labels=moicData.map(x=>x.n);
charts.c10.data.datasets[0].data=moicData.map(x=>x.moic);
charts.c10.data.datasets[0].backgroundColor=moicData.map(x=>x.moic>=1?'#4ECDC4':'#FF6B6B');
charts.c10.update();

// NOI and CAPEX (through Dec 2028)
const noiD=new Array(MC).fill(0),capD=new Array(MC).fill(0);
for(const i of wList){for(let j=0;j<MC;j++){noiD[j]+=d.noi[i][j]||0;capD[j]+=W[i].capex[j];}}
charts.c11.data.datasets[0].data=noiD;
charts.c11.options.plugins.title.text='Monthly Net Operating Income - Based on Production Month ($K)'+(isAll?'':' - '+W[f].name);charts.c11.update();
charts.c12.data.datasets[0].data=capD;
charts.c12.options.plugins.title.text='Monthly CAPEX ($K)'+(isAll?'':' - '+W[f].name);charts.c12.update();

// Gross EUR by Well (sorted by total BOE descending)
const eurData=wList.map(i=>({n:W[i].name,oil:W[i].eurOil,gas:W[i].eurGas/6,ngl:W[i].eurNGL}))
  .sort((a,b)=>(b.oil+b.gas+b.ngl)-(a.oil+a.gas+a.ngl));
charts.c13.data.labels=eurData.map(x=>x.n);
charts.c13.data.datasets[0].data=eurData.map(x=>x.oil);
charts.c13.data.datasets[1].data=eurData.map(x=>x.gas);
charts.c13.data.datasets[2].data=eurData.map(x=>x.ngl);
charts.c13.update();

// Gross CAPEX by Well (sorted descending)
const gcData=wList.map(i=>({n:W[i].name,gc:W[i].grossCapex})).filter(x=>x.gc>0).sort((a,b)=>b.gc-a.gc);
charts.c14.data.labels=gcData.map(x=>x.n);charts.c14.data.datasets[0].data=gcData.map(x=>x.gc);
charts.c14.update();

// First 6 Mo / Lateral Ft (sorted by total BOE/ft descending)
const f6Data=wList.filter(i=>W[i].latFt>0).map(i=>{const lf=W[i].latFt;return{n:W[i].name,
oil:W[i].f6Oil*1000/lf,gas:W[i].f6Gas*1000/lf/6,ngl:W[i].f6NGL*1000/lf};})
  .sort((a,b)=>(b.oil+b.gas+b.ngl)-(a.oil+a.gas+a.ngl));
charts.c15.data.labels=f6Data.map(x=>x.n);
charts.c15.data.datasets[0].data=f6Data.map(x=>+x.oil.toFixed(2));
charts.c15.data.datasets[1].data=f6Data.map(x=>+x.gas.toFixed(2));
charts.c15.data.datasets[2].data=f6Data.map(x=>+x.ngl.toFixed(2));
charts.c15.update();

// EUR / Lateral Ft (sorted by total BOE/ft descending)
const elfData=wList.filter(i=>W[i].latFt>0).map(i=>{const lf=W[i].latFt;return{n:W[i].name,
oil:W[i].eurOil*1000/lf,gas:W[i].eurGas*1000/lf/6,ngl:W[i].eurNGL*1000/lf};})
  .sort((a,b)=>(b.oil+b.gas+b.ngl)-(a.oil+a.gas+a.ngl));
charts.c16.data.labels=elfData.map(x=>x.n);
charts.c16.data.datasets[0].data=elfData.map(x=>+x.oil.toFixed(2));
charts.c16.data.datasets[1].data=elfData.map(x=>+x.gas.toFixed(2));
charts.c16.data.datasets[2].data=elfData.map(x=>+x.ngl.toFixed(2));
charts.c16.update();
}

const d=recomp(oP,gP,nP);
let wi;
if(src==='payout') wi=charts.c1._payIdx[chartIdx];
else if(src==='nma') wi=(sel()<0?chartIdx:sel());
else if(src==='nri') wi=charts.c5._nriIdx[chartIdx];
else if(src==='afe') wi=charts.c6._afeIdx[chartIdx];
else wi=chartIdx;
if(wi==null||wi<0||wi>=W.length)return;
const w=W[wi];
const rows=[
['Unit',w.unit||'--'],['Formation',w.reservoir||'--'],
['North STR',w.strN||'--'],w.strM?['Middle STR',w.strM]:null,['South STR',w.strS||'--'],
['NMA',addC(w.nma.toFixed(1))],['W.I.',(w.wi_pct*100).toFixed(2)+'%'],['NRI',(w.nri_pct*100).toFixed(2)+'%'],
['8/8ths NRI',(w.nri8*100).toFixed(2)+'%'],['Lateral',addC(w.latFt.toFixed(0))+' ft'],
['IRR',d.irr[wi]!=null?(d.irr[wi]*100).toFixed(1)+'%':'N/A'],
['Payout Month',d.pm[wi]!=null?d.pm[wi]+' mo':'N/A'],['AFE/NMA','$'+addC(w.afeNma.toFixed(0))],
['Gross CAPEX','$'+addC(w.grossCapex.toFixed(0))+'K'],
['$/NMA Mo 18',d.cnAt(wi,18)!=null?fmtNMA(d.cnAt(wi,18)):'--'],
['$/NMA Mo 24',d.cnAt(wi,24)!=null?fmtNMA(d.cnAt(wi,24)):'--'],
['$/NMA Mo 36',d.cnAt(wi,36)!=null?fmtNMA(d.cnAt(wi,36)):'--'],
['Cum CF',fmtMdol(d.cum[wi][N-1])],
['PV10',fmtMdol(d.pv10[wi])],
['PV10/NMA',w.nma>0?fmtNMA(d.pv10[wi]/w.nma*1000):'--'],
['Gross EUR Oil',addC(w.eurOil.toFixed(0))+' MBbl'],
['Gross EUR Gas',addC(w.eurGas.toFixed(0))+' MMcf'],
['Gross EUR NGL',addC(w.eurNGL.toFixed(0))+' MBbl'],
['First 6 Mo Oil/ft',(w.latFt>0?(w.f6Oil*1000/w.latFt).toFixed(1):'--')+' Bbl/ft'],
['First 6 Mo Gas/ft',(w.latFt>0?(w.f6Gas*1000/w.latFt).toFixed(1):'--')+' Mcf/ft'],
['First 6 Mo NGL/ft',(w.latFt>0?(w.f6NGL*1000/w.latFt).toFixed(1):'--')+' Bbl/ft'],
['EUR Oil/ft',(w.latFt>0?(w.eurOil*1000/w.latFt).toFixed(1):'--')+' Bbl/ft'],
['EUR Gas/ft',(w.latFt>0?(w.eurGas*1000/w.latFt).toFixed(1):'--')+' Mcf/ft'],
['EUR NGL/ft',(w.latFt>0?(w.eurNGL*1000/w.latFt).toFixed(1):'--')+' Bbl/ft'],
];
document.getElementById('pn').textContent=w.name;
document.getElementById('pt').innerHTML=rows.filter(r=>r).map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('');
document.getElementById('po').style.display='block';document.getElementById('pp').style.display='block';
}
function closePanel(){document.getElementById('po').style.display='none';document.getElementById('pp').style.display='none';}

function showCapex(monthIdx){
const wellCap=[];
for(let i=0;i<W.length;i++){const c=W[i].capex[monthIdx]||0;if(c!==0)wellCap.push({n:W[i].name,c:c});}
if(!wellCap.length)return;
wellCap.sort((a,b)=>Math.abs(b.c)-Math.abs(a.c));
const total=wellCap.reduce((s,x)=>s+x.c,0);
const rows=wellCap.map(x=>['<span style="cursor:pointer;color:#d4a84b" onclick="goWell(\''+x.n.replace(/'/g,"\\'")+'\')">'+x.n+'</span>','$'+addC(Math.round(x.c).toString())+'K']);
rows.push(['<b>Total</b>','<b>$'+addC(Math.round(total).toString())+'K</b>']);
document.getElementById('pn').textContent='CAPEX - '+DT[monthIdx];
document.getElementById('pt').innerHTML=rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('');
document.getElementById('po').style.display='block';document.getElementById('pp').style.display='block';
}
function goWell(name){const idx=W.findIndex(w=>w.name===name);if(idx<0)return;document.getElementById('wf').value=idx;closePanel();update();}

function kpi(l,v){return'<div class="kpi"><div class="l">'+l+'</div><div class="v">'+v+'</div></div>';}
function resetAll(){document.getElementById('oS').value=BO;document.getElementById('gS').value=BG;document.getElementById('nS').value=BN;document.getElementById('wf').value=-1;document.getElementById('cf').value='all';syncWellDropdown();update();}
['oS','gS','nS','wf'].forEach(id=>document.getElementById(id).addEventListener('input',update));
document.getElementById('cf').addEventListener('change',()=>{syncWellDropdown();update();});
init();
// URL param: ?well=BEATY 1-2-11-14CHX or display name
const urlWell=new URLSearchParams(location.search).get('well');
if(urlWell){const idx=W.findIndex(w=>w.name===urlWell||w.name.toLowerCase()===urlWell.toLowerCase());if(idx>=0)document.getElementById('wf').value=idx;}
update();
</script></body></html>
